<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>失重逃生体液测试</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="space-layer" aria-hidden="true">
        <div class="pixel-stars"></div>
        <div class="pixel-planet"></div>
        <div class="pixel-ship"></div>
    </div>

    <main class="app-shell">
        <header class="masthead">
            <p class="eyebrow">古希腊四体液混合性格测试</p>
            <h1>失重逃生</h1>
            <p class="dek">你是一名太空宇航员。飞船发生意外，跟着 20 个不同选项一路逃到回收灯亮起，看看你在绝境里最像哪一种性格组合，以及其他性格类型的人更适合在你身边扮演什么角色。</p>
        </header>

        <section id="start-screen" class="panel">
            <p class="panel-kicker">碎片带撞穿船尾，通讯时断时续，主舰正在缓慢失压。</p>
            <h2>准备好了吗？</h2>
            <p class="panel-copy">一路按直觉作答。结果会告诉你自己的混合体液类型，也会告诉你其他类型的人更适合在你身边当爱人、导师还是朋友。</p>
            <div class="status-strip" aria-hidden="true">
                <span>氧气 61%</span>
                <span>动力 38%</span>
                <span>信标离线</span>
            </div>
            <div class="hero-media">
                <img id="intro-image" class="scene-image" alt="像素风宇航员主角">
            </div>
            <button id="start-button" class="action-button" type="button">进入 20 幕逃生</button>
            <p class="credit">作者：C</p>
        </section>

        <section id="quiz-screen" class="panel" hidden>
            <div class="hud">
                <div>
                    <p id="question-counter" class="hud-label">第 1 / 20 幕</p>
                    <p id="chapter-title" class="chapter-title">休眠舱惊醒</p>
                </div>
                <div class="meter" aria-hidden="true">
                    <div id="progress-fill" class="meter-fill"></div>
                </div>
            </div>

            <p id="reaction-text" class="reaction-text" hidden></p>
            <p id="scene-text" class="scene-text"></p>
            <h2 id="question-text" class="question-text"></h2>
            <div class="scene-media">
                <img id="scene-image" class="scene-image" alt="当前逃生场景的像素图">
            </div>
            <div id="options" class="options"></div>

            <div class="action-row">
                <p id="selection-hint" class="selection-hint">先选一个动作，剧情才会往下走。</p>
                <button id="next-button" class="action-button" type="button" disabled>锁定这一步</button>
            </div>
        </section>

        <section id="result-screen" class="panel" hidden>
            <p class="panel-kicker">逃生结果已回收</p>
            <h2 id="result-name" class="result-name"></h2>
            <p id="result-summary" class="result-summary"></p>
            <p id="blend-summary" class="blend-summary"></p>
            <div id="mix-stats" class="mix-stats"></div>
            <div id="scoreboard" class="scoreboard"></div>
            <div id="role-cast" class="role-cast"></div>
            <div id="result-detail" class="result-detail"></div>
            <div class="result-actions">
                <button id="save-button" class="action-button" type="button">保存结果</button>
                <button id="restart-button" class="action-button secondary-action" type="button">重新测试</button>
            </div>
        </section>
    </main>

    <script charset="UTF-8" src="script.js"></script>
</body>
</html>
